name: Web CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: web
    steps:
      - name: Require infra-provided config
        run: |
          ok=1
          [ -n '${{ vars.API_INTERNAL_URL }}' ] || { echo "::error::Variable API_INTERNAL_URL is not set — run the Infra workflow first."; ok=0; }
          [ -n '${{ vars.CF_PAGES_PROJECT }}' ] || { echo "::error::Variable CF_PAGES_PROJECT is not set — run the Infra workflow first."; ok=0; }
          [ "$ok" = "1" ]
        working-directory: .
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Build (Cloudflare Pages preset)
        env:
          NITRO_PRESET: cloudflare-pages
          # Frontend calls /api relatively (same-origin); the Pages worker proxies /api/**
          # to the backend behind the Cloudflare tunnel. VITE_API_URL stays empty.
          API_PROXY_TARGET: ${{ vars.API_INTERNAL_URL }}
          # Site identity & social links (repo Variables; defaults live in config.ts)
          VITE_SITE_NAME: ${{ vars.SITE_NAME }}
          VITE_SOCIAL_GITHUB: ${{ vars.SOCIAL_GITHUB }}
          VITE_SOCIAL_LINKEDIN: ${{ vars.SOCIAL_LINKEDIN }}
          VITE_SOCIAL_INSTAGRAM: ${{ vars.SOCIAL_INSTAGRAM }}
          VITE_CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
        run: npm run build
      - name: Flatten static assets to the deploy root
        # Nitro's cloudflare-pages output keeps static files under public/, but
        # Pages only serves statics from the upload root — without this, every
        # /assets/* request 404s and the site renders unstyled.
        run: cp -r dist/analog/public/. dist/analog/
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          # Nitro's cloudflare-pages output root (contains _worker.js + _routes.json + public/).
          command: pages deploy dist/analog --project-name=${{ vars.CF_PAGES_PROJECT }}
