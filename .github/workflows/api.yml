name: API CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'k8s/**'
      - '.github/workflows/api.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/personal-website-api

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build api/PersonalWebsite.sln -c Release
      # Add `dotnet test` here once a test project exists.

  build-push:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: ./api
          platforms: linux/arm64 # Raspberry Pi 5 = aarch64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    # Reaches the private k3s API server through the Cloudflare tunnel (k8s/cloudflared.yaml)
    # via `cloudflared access tcp` + a Zero Trust SERVICE TOKEN. The stored KUBE_CONFIG must
    # point at https://127.0.0.1:6443 with `tls-server-name: kubernetes.default.svc`.
    # (Alternative: a self-hosted runner on a Pi — `runs-on: [self-hosted, k3s]` — then drop
    # the cloudflared steps and use the node's local kubeconfig.)
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
      - name: Open tunnel to k3s API server
        env:
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          cloudflared access tcp --hostname '${{ vars.K8S_API_HOSTNAME }}' --url 127.0.0.1:6443 &
          for i in $(seq 1 30); do
            (echo > /dev/tcp/127.0.0.1/6443) >/dev/null 2>&1 && break
            sleep 1
          done
          echo "k3s API reachable on 127.0.0.1:6443"
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
      - name: Ensure namespace
        run: kubectl apply -f k8s/namespace.yaml
      - name: Sync secrets from GitHub repo secrets
        run: |
          kubectl -n personal-website create secret generic pw-postgres \
            --from-literal=POSTGRES_USER='${{ secrets.POSTGRES_USER }}' \
            --from-literal=POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
            --from-literal=POSTGRES_DB='${{ secrets.POSTGRES_DB }}' \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n personal-website create secret generic pw-secrets \
            --from-literal=ConnectionStrings__Postgres="Host=postgres;Port=5432;Database=${{ secrets.POSTGRES_DB }};Username=${{ secrets.POSTGRES_USER }};Password=${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=Jwt__Key='${{ secrets.JWT_KEY }}' \
            --from-literal=Admin__Email='${{ secrets.ADMIN_EMAIL }}' \
            --from-literal=Admin__Password='${{ secrets.ADMIN_PASSWORD }}' \
            --from-literal=R2__Endpoint='${{ secrets.R2_ENDPOINT }}' \
            --from-literal=R2__AccessKey='${{ secrets.R2_ACCESS_KEY }}' \
            --from-literal=R2__SecretKey='${{ secrets.R2_SECRET_KEY }}' \
            --from-literal=R2__Bucket='${{ secrets.R2_BUCKET }}' \
            --from-literal=R2__PublicBaseUrl='${{ secrets.R2_PUBLIC_BASE_URL }}' \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: GHCR pull secret (only needed if the package is private)
        if: ${{ secrets.GHCR_PULL_TOKEN != '' }}
        run: |
          kubectl -n personal-website create secret docker-registry ghcr \
            --docker-server=ghcr.io \
            --docker-username='${{ github.actor }}' \
            --docker-password='${{ secrets.GHCR_PULL_TOKEN }}' \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Apply manifests & roll out
        run: |
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/api.yaml
          kubectl -n personal-website set image deployment/api api=${{ env.IMAGE }}:sha-${{ github.sha }}
          kubectl -n personal-website rollout status deployment/api --timeout=180s
