# Template ONLY — do not commit real values. In CI these two Secrets are created
# from GitHub repo secrets via `kubectl create secret ... --dry-run | kubectl apply`.
# To create them by hand for a first manual deploy, fill in and `kubectl apply -f`.
apiVersion: v1
kind: Secret
metadata:
  name: pw-postgres
  namespace: personal-website
type: Opaque
stringData:
  POSTGRES_USER: pwuser
  POSTGRES_PASSWORD: REPLACE_ME
  POSTGRES_DB: personalwebsite
---
apiVersion: v1
kind: Secret
metadata:
  name: pw-secrets
  namespace: personal-website
type: Opaque
stringData:
  # ASP.NET Core binds these (double underscore = config section nesting)
  ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=personalwebsite;Username=pwuser;Password=REPLACE_ME"
  Jwt__Key: "REPLACE_ME_min_32_chars"
  Admin__Email: "danilo@neumannmarques.com"
  Admin__Password: "REPLACE_ME"
  # Where the browser loads the frontend from (Cloudflare Pages URL) — CORS allowlist
  Cors__Origins__0: "https://your-site.pages.dev"
  R2__Endpoint: "https://ACCOUNTID.r2.cloudflarestorage.com"
  R2__AccessKey: "REPLACE_ME"
  R2__SecretKey: "REPLACE_ME"
  R2__Bucket: "personal-website-assets"
  R2__PublicBaseUrl: "https://assets.yourdomain.com"
