# Cloudflare Tunnel (cloudflared) — remotely-managed tunnel.
#
# The tunnel, its ingress rules (api-internal.<domain> → api service,
# k8s.<domain> → k3s API server), DNS records and the Zero Trust Access app are
# all provisioned by OpenTofu — see infra/. Here we only run the connector.
#
# The token comes from the `cloudflared-token` Secret, created by CI from the
# GitHub secret CLOUDFLARE_TUNNEL_TOKEN (or manually:
#   kubectl -n personal-website create secret generic cloudflared-token \
#     --from-literal=token="$(cd infra && tofu output -raw tunnel_token)"
# )
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudflared
  namespace: personal-website
spec:
  # DaemonSet = one connector per node — if a Pi dies, the other keeps the
  # tunnel alive (each pod holds its own 4 QUIC connections to the edge).
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: token
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
