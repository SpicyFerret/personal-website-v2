apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: personal-website
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: personal-website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: ghcr # created by CI from a GitHub PAT (only needed if the package is private)
      containers:
        - name: api
          # CI replaces the tag via `kubectl set image` on each deploy.
          # NOTE: must be lowercase (image refs reject uppercase).
          image: ghcr.io/spicyferret/personal-website-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:8080
          envFrom:
            - secretRef:
                name: pw-secrets # ConnectionStrings__Postgres, Jwt__Key, Admin__*, Cors__Origins__0, R2__*
          readinessProbe:
            httpGet:
              path: /api/projects
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/projects
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
